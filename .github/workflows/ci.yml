name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.9.9
      - run: ruff check .
      - run: ruff format --check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-cov cryptography pyyaml
      - name: Run unit and integration tests
        run: pytest -m "not e2e" --cov=buncker --cov=buncker_fetch --cov=shared --cov-fail-under=80
      - name: Run e2e tests
        run: pytest -m e2e -v

  build-deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build .deb packages
        run: make build-deb
      - name: Verify .deb packages
        run: |
          for deb in dist/*.deb; do
            echo "--- $deb ---"
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb"
          done
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb
          retention-days: 30

  build-rpm:
    needs: test
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build tools
        run: dnf install -y rpm-build python3 make
      - name: Build .rpm packages
        run: make build-rpm
      - name: Verify .rpm packages
        run: |
          for rpm in dist/*.rpm; do
            echo "--- $rpm ---"
            rpm -qpi "$rpm"
            rpm -qpl "$rpm"
          done
      - name: Upload .rpm artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpm-packages
          path: dist/*.rpm
          retention-days: 30

  test-rpm-install:
    needs: build-rpm
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: rpm-packages
          path: dist/
      - name: Install RPMs
        run: |
          dnf install -y python3-cryptography python3-pyyaml
          rpm -ivh dist/*.noarch.rpm
      - name: Verify installation
        run: |
          test -x /usr/bin/buncker
          test -x /usr/bin/buncker-fetch
          test -f /usr/lib/systemd/system/buncker.service
          test -f /etc/logrotate.d/buncker
          test -d /usr/lib/buncker/buncker
          test -d /usr/lib/buncker/shared
          test -d /usr/lib/buncker-fetch/buncker_fetch
          test -d /usr/lib/buncker-fetch/shared
          echo "RPM installation verified OK"

  test-deb-install:
    needs: build-deb
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: dist/
      - name: Build test container
        run: docker build -t buncker-deb-test -f tests/deb-install/Dockerfile .
      - name: Run verification
        run: docker run --rm buncker-deb-test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-deb, test-deb-install, build-rpm, test-rpm-install]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: rpm-packages
          path: dist/
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" dist/*.deb dist/*.rpm --title "Buncker ${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
