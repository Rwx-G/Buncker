name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.9.9
      - run: ruff check .
      - run: ruff format --check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pytest pytest-cov cryptography
      - name: Run unit and integration tests
        run: pytest -m "not e2e" --cov=buncker --cov=buncker_fetch --cov=shared --cov-fail-under=80
      - name: Run e2e tests
        run: pytest -m e2e -v

  build-deb:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build .deb packages
        run: make build-deb
      - name: Verify .deb packages
        run: |
          for deb in dist/*.deb; do
            echo "--- $deb ---"
            dpkg-deb --info "$deb"
            dpkg-deb --contents "$deb"
          done
      - name: Upload .deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-deb
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: deb-packages
          path: dist/
      - name: Create GitHub Release
        run: gh release create "${{ github.ref_name }}" dist/*.deb --title "Buncker ${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
