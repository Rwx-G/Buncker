name: Feature Request
description: Suggest a feature for Buncker
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component would this feature affect?
      options:
        - buncker (offline daemon)
        - buncker-fetch (online CLI)
        - shared/crypto
        - shared/oci
        - Packaging / CI
        - Documentation
        - New component
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What's missing today?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you've considered and why they don't fit.
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: How big is this feature?
      options:
        - Small - single file or minor change
        - Medium - touches a few modules
        - Large - new component or significant rework
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Use cases, references, diagrams, or anything else relevant.
    validations:
      required: false
