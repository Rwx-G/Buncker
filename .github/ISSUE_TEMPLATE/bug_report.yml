name: Bug Report
description: Report a bug to help improve Buncker
title: "[BUG] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - buncker (offline daemon)
        - buncker-fetch (online CLI)
        - shared/crypto
        - shared/oci
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System details where the bug occurred.
      value: |
        - OS:
        - Python version:
        - Buncker version:
      render: markdown
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant log output (from /var/lib/buncker/logs/ or ~/.buncker/logs/). Remove any sensitive data.
      render: text
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How critical is this bug?
      options:
        - Low - cosmetic or minor inconvenience
        - Medium - feature works but with issues
        - High - feature broken, workaround exists
        - Critical - data loss, security issue, or no workaround
    validations:
      required: true
